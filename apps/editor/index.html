<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SlopWars — Map Editor</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="theme-color" content="#0a0a0b">
<style>
  /* Unreal-style near-black editor palette */
  :root{
    --bg:#0a0a0b; --panel:#181a1d; --panel2:#202327; --panel3:#26292e;
    --line:#0c0d0e; --line2:#34383e; --text:#c8ccd2; --dim:#7d838c;
    --accent:#0a84ff; --accent2:#3a9bff; --amber:#f5a623; --green:#7bc043; --red:#e05a4d;
    --font:"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:"Consolas","JetBrains Mono",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:12px}
  :root{--left-w:236px;--right-w:288px;--dock-h:224px;--store-w:300px}
  #app{display:grid;grid-template-rows:auto 1fr var(--dock-h);height:100%;position:relative}
  .empty{color:var(--dim);padding:10px;font-style:italic;font-size:12px}

  /* resizable gutters */
  .resizer{position:absolute;z-index:20;background:transparent}
  .resizer:hover,.resizer:active{background:var(--accent)}
  .resizer-left{top:0;bottom:0;left:calc(var(--left-w) - 3px);width:6px;cursor:col-resize}
  .resizer-right{top:0;bottom:0;right:calc(var(--right-w) - 3px);width:6px;cursor:col-resize}
  .resizer-dock{left:0;right:0;bottom:calc(var(--dock-h) - 3px);height:6px;cursor:row-resize}

  /* toolbar */
  #toolbar{display:flex;align-items:center;gap:5px;padding:6px 9px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .brand-icon{height:24px;width:24px;object-fit:contain;border-radius:5px;display:block;flex:0 0 auto}
  .brand{font-weight:700;color:#fff;letter-spacing:.02em;margin-right:6px;font-size:13px}
  .bar-sep{width:1px;height:20px;background:var(--line2);margin:0 4px}
  .bar-label{color:var(--dim)}
  .map-name{margin-left:auto;color:#eef1f4;font-weight:600;font-size:12px;letter-spacing:.02em}
  .map-picker{background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:4px;padding:4px 7px;font-family:var(--font)}
  /* uniform toolbar button box so the icon-bearing Save doesn't sit taller/raised than the text-only buttons */
  #toolbar .btn{box-sizing:border-box;min-height:26px}
  /* centre-align the save cluster so the icon-bearing Save shares the text buttons' baseline (else it rides ~2.5px high) */
  #save-group{display:inline-flex;align-items:center;gap:5px}
  .tool-group{display:flex;gap:0;border:1px solid var(--line2);border-radius:5px;overflow:hidden}
  .tool-group .btn{border:none;border-right:1px solid var(--line);border-radius:0}
  .tool-group .btn:last-child{border-right:none}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:4px;padding:4px 10px;cursor:pointer;font-family:var(--font);font-size:12px;line-height:1}
  .btn:hover{background:var(--panel3)}
  .btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .btn.primary:hover{background:var(--accent2)}
  .btn.mini{padding:2px 4px;font-size:12px;color:var(--dim);border-color:transparent;background:transparent}
  .btn.mini:hover{color:#fff;background:var(--panel3)}

  /* inline icons — inherit currentColor, size to the surrounding text */
  .icon{width:1.16em;height:1.16em;flex:0 0 auto;display:block;stroke:currentColor;fill:none;vertical-align:middle}
  .btn.mini .icon{width:14px;height:14px}

  /* context menu (right-click actions) */
  .ctx-menu{position:fixed;z-index:200;min-width:174px;background:var(--panel2);border:1px solid var(--line2);border-radius:6px;padding:4px;box-shadow:0 10px 30px rgba(0,0,0,.5);font-size:12px}
  .ctx-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:transparent;border:none;border-radius:4px;padding:6px 9px;color:var(--text);cursor:pointer;font-family:var(--font);font-size:12px}
  .ctx-item:hover{background:var(--accent);color:#fff}
  .ctx-item.danger{color:#e5726d}
  .ctx-item.danger:hover{background:var(--red);color:#fff}
  .ctx-item.disabled,.ctx-item.disabled:hover{color:var(--dim);cursor:default;opacity:.55;background:transparent}
  .ctx-ico{width:15px;height:15px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center}
  .ctx-ico .icon{width:15px;height:15px}
  .ctx-label{flex:1}
  .ctx-sep{height:1px;background:var(--line2);margin:4px 6px}

  /* main split */
  #main{display:grid;grid-template-columns:var(--left-w) 1fr var(--right-w);overflow:hidden;min-height:0;position:relative}
  .col{overflow:auto;background:var(--panel);border-right:1px solid var(--line)}
  #inspector{border-right:none;border-left:1px solid var(--line);padding:0 10px 14px}
  #viewport{position:relative;background:#050506;overflow:hidden;display:flex;flex-direction:column;min-width:0}
  .vp-stage{position:relative;flex:1;min-height:0;overflow:hidden}
  #editor-canvas,#preview-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #editor-canvas{cursor:crosshair}
  #preview-canvas{display:none;cursor:grab;background:#050506}
  #preview-canvas:active{cursor:grabbing}
  .viewport-overlay{position:absolute;inset:0;pointer-events:none}
  /* preview tabs hide the map canvas + its HUD; map tabs hide the preview canvas */
  .vp-stage.preview #editor-canvas,.vp-stage.preview .viewport-overlay,.vp-stage.preview .vp-perf,.vp-stage.preview .vp-hint{display:none}
  .vp-stage:not(.preview) #preview-canvas,.vp-stage:not(.preview) .vp-modes{display:none}
  /* no document open → a blank grey stage (no 3D render lingering) */
  .vp-stage.empty{background:#202327}
  .vp-stage.empty #editor-canvas,.vp-stage.empty #preview-canvas,.vp-stage.empty .viewport-overlay,.vp-stage.empty .preview-overlay,.vp-stage.empty .vp-perf,.vp-stage.empty .vp-hint,.vp-stage.empty .vp-modes,.vp-stage.empty .vp-envbtn{display:none!important}
  .vp-stage.empty::after{content:"No document open";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px;letter-spacing:.02em}
  /* left column collapses for preview tabs (no outliner). Keep #scene-col in the
     grid as a zero-width, clipped slot — using display:none would drop it from the
     grid and reflow the viewport/inspector into the wrong columns. */
  #main.no-left{grid-template-columns:0 1fr var(--right-w)}
  #main.no-left>#scene-col{overflow:hidden;pointer-events:none;border:none}
  #main.no-left .resizer-left{display:none}

  /* viewport tab strip */
  .vp-tabs{display:flex;align-items:stretch;gap:1px;background:var(--line);border-bottom:1px solid var(--line);overflow-x:auto;overflow-y:hidden;min-height:30px;flex:0 0 auto;scrollbar-width:none;overscroll-behavior-x:contain}
  .vp-tabs::-webkit-scrollbar{display:none}
  .vp-tab{display:flex;align-items:center;gap:7px;padding:0 8px 0 11px;background:var(--panel);color:var(--dim);border:none;border-right:1px solid var(--line);cursor:pointer;font-family:var(--font);font-size:12px;white-space:nowrap;max-width:220px}
  .vp-tab:hover{background:var(--panel2);color:var(--text)}
  .vp-tab.on{background:var(--panel2);color:#fff;box-shadow:inset 0 2px 0 var(--accent)}
  .vp-tab .vp-tab-ico{display:inline-flex;align-items:center;opacity:.85}
  .vp-tab .vp-tab-ico .icon{width:14px;height:14px}
  .vp-tab .vp-tab-x .icon{width:13px;height:13px}
  .vp-tab .vp-tab-name{overflow:hidden;text-overflow:ellipsis}
  .vp-tab .vp-tab-x{opacity:0;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:12px;padding:0 2px;border-radius:3px;line-height:1}
  .vp-tab:hover .vp-tab-x{opacity:1}
  .vp-tab .vp-tab-x:hover{color:#fff;background:var(--panel3)}
  .vp-tab.dirty .vp-tab-name::after{content:" *";color:var(--amber)}

  /* model view segmented control (Model / Collision) floating in the stage */
  .vp-modes{position:absolute;left:10px;top:8px;display:flex;gap:0;border:1px solid var(--line2);border-radius:5px;overflow:hidden;background:rgba(10,12,14,.7);backdrop-filter:blur(3px);z-index:3}
  .vp-modes button{background:transparent;border:none;border-right:1px solid var(--line2);color:var(--dim);padding:4px 11px;font-family:var(--font);font-size:11px;cursor:pointer}
  .vp-modes button:last-child{border-right:none}
  .vp-modes button:hover{color:var(--text)}
  .vp-modes button.on{background:var(--accent);color:#fff}

  /* preview-tab gizmo overlay (collision authoring) — drawn over the preview canvas */
  .preview-overlay{position:absolute;inset:0;pointer-events:none;z-index:2}
  .vp-stage:not(.preview) .preview-overlay{display:none}
  /* preview environment (skybox) button — floats top-right on material/texture tabs */
  .vp-envbtn{position:absolute;right:10px;top:8px;display:none;align-items:center;gap:5px;border:1px solid var(--line2);border-radius:5px;background:rgba(10,12,14,.7);backdrop-filter:blur(3px);color:var(--text);padding:5px 10px;font-family:var(--font);font-size:11px;cursor:pointer;z-index:3}
  .vp-envbtn:hover{color:#fff;border-color:var(--accent)}
  .vp-envbtn.on{display:inline-flex}

  /* collision solid rows (inspector) + environment swatches (env picker modal) */
  .side-note{color:var(--dim);font-size:11px;line-height:1.5;margin:2px 0 10px}
  .cbox-row{display:flex;align-items:center;gap:6px;padding:4px 6px;border:1px solid var(--line2);border-radius:4px;margin:3px 0;cursor:pointer;background:var(--panel2)}
  .cbox-row.sel{border-color:var(--accent);background:#123}
  .cbox-row .cbox-name{flex:1;font-family:var(--mono);font-size:11px;color:var(--text)}
  .cbox-row .cbox-shape{background:var(--panel3);color:var(--text);border:1px solid var(--line2);border-radius:3px;font-size:11px;padding:1px 3px}
  .cbox-row .btn.mini{opacity:.6}
  .cbox-row:hover .btn.mini{opacity:1}
  .env-swatch{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:6px;margin:2px;padding:10px;max-height:60vh;overflow:auto;min-width:360px}
  .env-card{border:1px solid var(--line2);border-radius:5px;padding:4px;cursor:pointer;background:var(--panel2);text-align:center}
  .env-card.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .env-card .asset-thumb{height:46px}
  .env-card .env-name{font-size:10px;color:var(--text);margin-top:3px;word-break:break-word}
  .vp-perf{position:absolute;left:10px;top:8px;color:#9fe6a0;font-size:11px;font-family:var(--mono);pointer-events:none;text-shadow:0 1px 2px #000;background:rgba(0,0,0,.35);padding:3px 7px;border-radius:4px}
  .vp-hint{position:absolute;left:10px;bottom:8px;color:var(--dim);font-size:11px;font-family:var(--mono);pointer-events:none;text-shadow:0 1px 2px #000}
  .col-head{padding:7px 10px;font-weight:600;color:#eef1f4;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);letter-spacing:.02em;text-transform:uppercase;font-size:11px}

  /* scene outliner */
  .sg-search-bar{padding:6px 8px;position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);z-index:1}
  .sg-search{flex:1;min-width:0;background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:4px;padding:4px 8px;font-family:var(--font);font-size:12px}
  .sg-search:focus{outline:none;border-color:var(--accent)}
  .sg-list{padding:4px 0}
  .sg-row{display:flex;align-items:center;gap:6px;padding:3px 8px 3px 12px;cursor:pointer;border-left:2px solid transparent}
  .sg-row:hover{background:var(--panel2)}
  .sg-row.sel{background:#123;border-left-color:var(--accent)}
  .sg-row.sel.primary{background:#1a3350}
  .sg-row.drop{background:#12233a;border-left-color:var(--accent2);outline:1px dashed var(--accent2);outline-offset:-2px}
  .sg-label{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:capitalize}
  .sg-row .btn.mini{opacity:0}
  .sg-row:hover .btn.mini{opacity:1}
  .sg-world{border-bottom:1px solid var(--line2)}
  .sg-ico{margin-right:4px;display:inline-flex;align-items:center;color:var(--dim)}
  .sg-ico .icon{width:14px;height:14px}
  .sg-caret .icon{width:12px;height:12px}
  .sg-group .sg-ico{color:#e6c98a}
  .sg-group .sg-label{font-weight:600;color:#e6c98a;text-transform:none}
  .sg-caret{width:12px;display:inline-block;text-align:center;color:var(--dim);cursor:pointer;flex:0 0 auto}
  .sg-search-bar{display:flex;gap:6px;align-items:center}
  .sg-groupbtn{flex:0 0 auto;color:var(--accent2);border-color:var(--line2);background:var(--panel2)}
  .sg-groupbtn:hover{color:#fff;background:var(--accent)}
  .rename-input{flex:1;min-width:0;background:var(--panel3);color:#fff;border:1px solid var(--accent);border-radius:3px;padding:2px 6px;font-family:var(--font);font-size:12px}
  .rename-input:focus{outline:none}
  .insp-title .rename-input,h3.rename-input{font-size:14px}

  /* inspector */
  .insp-title{color:#fff;font-size:14px;padding-top:12px;text-transform:capitalize}
  .insp-sub{color:var(--dim);font-size:11px;margin-bottom:4px;font-family:var(--mono)}
  .insp-group{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 5px;border-bottom:1px solid var(--line2);padding-bottom:3px}
  .field{display:flex;align-items:center;gap:8px;margin:4px 0}
  .field.check{cursor:pointer}
  .field-label{color:var(--dim);min-width:66px;font-size:12px;text-transform:capitalize}
  .field-input{flex:1;min-width:0;background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:3px;padding:3px 6px;font-family:var(--mono);font-size:12px}
  .field-input:focus{outline:none;border-color:var(--accent)}
  .field-color{flex:1;min-width:0;height:26px;padding:0;background:var(--panel2);border:1px solid var(--line2);border-radius:3px;cursor:pointer}
  .field.vec3{align-items:flex-start;flex-direction:column;gap:3px}
  .vec3-inputs{display:flex;gap:4px;width:100%}
  .vec3-inputs .field-input{width:0}
  .field-lock{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:24px;background:var(--panel2);color:var(--dim);border:1px solid var(--line2);border-radius:3px;cursor:pointer;padding:0}
  .field-lock:hover{color:var(--text)}
  .field-lock.on{color:var(--accent);border-color:var(--accent)}
  .field-lock .icon{width:13px;height:13px}

  /* dock: unified asset browser */
  #dock{display:flex;background:var(--panel);border-top:1px solid var(--line);overflow:hidden;min-height:0}
  #browser{display:flex;flex-direction:column;overflow:hidden;min-height:0;flex:1}
  .browser-bar{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--line)}
  .browser-title{font-weight:600;color:#eef1f4;letter-spacing:.02em;text-transform:uppercase;font-size:11px}
  .browser-search{margin-left:auto;background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:4px;padding:4px 8px;font-family:var(--font);width:180px}
  .browser-search:focus{outline:none;border-color:var(--accent)}
  .browser-tabs{display:flex;gap:2px;flex-wrap:wrap}
  .browser-tab{background:transparent;border:1px solid transparent;border-radius:4px;padding:3px 9px;color:var(--dim);font-family:var(--font);font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:.03em}
  .browser-tab:hover{color:var(--text)}
  .browser-tab.on{color:#fff;background:var(--panel2);border-color:var(--line2)}
  .browser-bar .imp-btn{margin-left:6px}
  .asset-card.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .asset-sub{font-size:10px;color:var(--dim);font-family:var(--mono);word-break:break-word}
  .map-card{cursor:pointer}
  .map-card:hover{border-color:var(--accent)}
  /* asset delete + dangling-reference + model/texture inspector previews */
  .btn.danger{background:transparent;color:#e5484d;border-color:#5a2b2d}
  .btn.danger:hover{background:#e5484d;color:#fff;border-color:#e5484d}
  .insp-delete{width:100%;margin-top:16px}
  .insp-addbtn{width:100%;margin:5px 0 8px}
  /* behaviour composition cards (a prop's attached gameplay traits) */
  .beh-card{border:1px solid var(--line2);border-radius:5px;background:var(--panel2);padding:6px 8px;margin:4px 0}
  .beh-card.sel{border-color:var(--accent);background:#123}
  .beh-head{display:flex;align-items:center;gap:6px;margin-bottom:2px}
  .beh-title{flex:1;font-size:11px;font-weight:600;color:var(--text)}
  .beh-head .btn.mini{opacity:.6}
  .beh-card:hover .beh-head .btn.mini{opacity:1}
  .beh-add{margin:6px 0 8px}
  .beh-add-sel{width:100%;background:var(--panel3);color:var(--text);border:1px solid var(--line2);border-radius:4px;font-size:12px;padding:5px 6px}
  .insp-note{color:var(--dim);font-size:11px;margin:2px 0 6px;line-height:1.4}
  .insp-modelprev{width:100%;height:120px;background:#0e0f10;border:1px solid var(--line2);border-radius:5px;margin:6px 0;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .insp-modelimg{max-width:100%;max-height:100%;object-fit:contain}
  .assetfield .af-warn{flex:0 0 auto;color:#e5a23a;font-size:13px}
  .assetfield.dangling{border-color:#7a4a1a;background:#241a10}
  .assetfield .af-name.dangling{color:#e5a23a;font-style:normal}
  .confirm{padding:4px 2px}
  .confirm-msg{color:var(--text);font-size:13px;margin:0 0 14px;line-height:1.5}
  .confirm-actions{display:flex;justify-content:flex-end;gap:8px}
  .browser-body{overflow:auto;padding:8px}
  .asset-section{margin-bottom:10px}
  .section-head{display:flex;align-items:center;gap:8px;margin:2px 2px 6px;position:sticky;top:-8px;background:var(--panel);padding:4px 0;z-index:1}
  .section-title{font-weight:600;color:#cfd3d9;letter-spacing:.04em;text-transform:uppercase;font-size:10px}
  .imp-btn{margin-left:auto;color:var(--accent2);border-color:var(--line2)!important;background:var(--panel2)!important}
  .imp-btn:hover{color:#fff;background:var(--accent)!important}
  .asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:7px}
  /* import dialog */
  .imp-body{padding:12px 14px;display:flex;flex-direction:column;gap:9px;min-width:380px;max-width:520px}
  .imp-hint{color:var(--dim);font-size:11px;line-height:1.5}
  .imp-row{display:flex;align-items:center;gap:10px}
  .imp-label{color:var(--dim);min-width:150px;font-size:12px}
  .imp-text{flex:1;min-width:0;background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:4px;padding:5px 7px;font-size:12px;font-family:var(--font)}
  .imp-text:focus{outline:none;border-color:var(--accent)}
  /* drag-drop file zone */
  .imp-drop{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;text-align:center;background:var(--panel2);border:1px dashed var(--line2);border-radius:5px;padding:11px 10px;font-size:12px;color:var(--dim);cursor:pointer;transition:border-color .12s,background .12s,color .12s}
  .imp-drop:hover{border-color:var(--accent2);color:var(--text)}
  .imp-drop.drop{border-color:var(--accent);background:#12233a;color:#fff}
  .imp-drop.has{border-style:solid;border-color:var(--line2);color:var(--text)}
  .imp-drop-hint{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .imp-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}
  .asset-card{background:var(--panel2);border:1px solid var(--line2);border-radius:5px;padding:7px;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;text-align:center}
  .asset-card.grab{cursor:grab}
  .asset-card.grab:hover{border-color:var(--accent)}
  .asset-thumb{width:100%;aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;background:#0e0f10;overflow:hidden}
  .asset-icon{font-size:22px;color:var(--dim);display:flex;align-items:center}
  .asset-icon-svg{width:30px;height:30px;color:var(--dim)}
  .env-card .asset-icon-svg{width:22px;height:22px}
  .thumb-img{width:100%;height:100%;object-fit:contain;display:block}
  .asset-name{font-size:11px;color:var(--text);word-break:break-word}
  /* ── audio preview tile (waveform + centre play/stop + scrub line) ── */
  .asset-thumb.audio-thumb{background:#0b0c0d}
  .audio-prev{position:relative;width:100%;height:100%}
  .audio-wave{position:absolute;inset:0;width:100%;height:100%;display:block}
  .audio-play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:34px;height:34px;padding:0;margin:0;
    border-radius:50%;background:rgba(14,16,18,.62);border:1px solid var(--line2);color:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);transition:background .1s,border-color .1s}
  .audio-play:hover{background:var(--accent);border-color:var(--accent)}
  .audio-play .icon{width:15px;height:15px}
  .audio-scrub{position:absolute;left:7px;right:7px;bottom:5px;height:9px;cursor:pointer}
  .audio-scrub::before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;transform:translateY(-50%);
    background:rgba(198,208,220,.22);border-radius:1px}
  .audio-pos{position:absolute;top:50%;left:0;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 4px rgba(0,0,0,.6)}
  .asset-card .btn.mini{position:absolute;top:1px;right:1px}

  /* modal (Load map) */
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100}
  .modal-card{background:var(--panel);border:1px solid var(--line2);border-radius:8px;min-width:340px;max-width:80vw;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--line2)}
  .modal-title{font-weight:600;color:#fff;font-size:13px}
  .map-list{overflow:auto;padding:6px}
  .map-row{display:flex;align-items:baseline;gap:10px;width:100%;text-align:left;background:transparent;border:none;border-radius:5px;padding:8px 10px;cursor:pointer;color:var(--text)}
  .map-row:hover{background:var(--panel2)}
  .map-row-name{font-weight:600;color:#eef1f4}
  .map-row-id{color:var(--dim);font-family:var(--mono);font-size:11px}

  /* drag-drop asset field + inline preview in the inspector */
  .assetfield{flex:1;min-width:0;display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line2);border-radius:4px;padding:3px 6px;cursor:default}
  .assetfield.drop{border-color:var(--accent);background:#12233a}
  .assetfield .af-prev{width:26px;height:26px;border-radius:3px;background:#0e0f10;flex:0 0 auto;object-fit:contain;display:block}
  .assetfield .af-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:12px;color:var(--text)}
  .assetfield .af-name.empty{color:var(--dim);font-style:italic}
  .assetfield .btn.mini{flex:0 0 auto}
  .af-prevwrap{width:26px;height:26px;border-radius:3px;background:#0e0f10;flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .af-ico{font-size:14px;color:var(--dim);display:inline-flex;align-items:center}
  .af-ico .icon{width:15px;height:15px}
  .af-warn{display:inline-flex;align-items:center}
  .af-warn .icon{width:14px;height:14px}

  /* texture-set card grid (the maps a set holds, auto-fitting) + the set editor */
  .tex-grid{width:100%;height:100%;display:grid;gap:1px;background:#0e0f10}
  .tex-grid .thumb-img{width:100%;height:100%;object-fit:cover}
  .tex-slot{margin:6px 0 10px}
  .tex-slot-head{display:flex;align-items:center;gap:6px;margin-bottom:3px}
  .tex-slot-label{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.04em;flex:1}
  .tex-slot-head .btn.mini{flex:0 0 auto}
  .tex-slot-drop{display:flex;align-items:center;justify-content:center;aspect-ratio:16/9;background:#0e0f10;border:1px dashed var(--line2);border-radius:5px;overflow:hidden;cursor:pointer;transition:border-color .12s,background .12s}
  .tex-slot-drop:hover{border-color:var(--accent2)}
  .tex-slot-drop.has{border-style:solid}
  .tex-slot-drop.drop{border-color:var(--accent);background:#12233a}
  .tex-slot-img{width:100%;height:100%;object-fit:contain;display:block}
  .tex-slot-empty{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--dim);font-size:11px}
  .tex-slot-empty .icon{width:20px;height:20px}
  .tex-users{display:flex;flex-direction:column;gap:3px;margin:2px 0 8px}
  .tex-user{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line2);border-radius:4px;padding:5px 8px;color:var(--text);cursor:pointer;font-family:var(--mono);font-size:12px;text-align:left}
  .tex-user:hover{border-color:var(--accent)}
  .tex-user-ico{width:14px;height:14px;flex:0 0 auto;color:var(--dim)}

  /* thumbnail picker modal */
  .picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:7px;padding:10px;overflow:auto;max-height:60vh;min-width:420px}
  .picker-card{background:var(--panel2);border:1px solid var(--line2);border-radius:5px;padding:6px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--text)}
  .picker-card:hover{border-color:var(--accent)}
  .picker-card .asset-thumb{width:100%;aspect-ratio:1;height:auto}
  .picker-card .asset-name{font-size:11px;word-break:break-word}

  /* ── Asset-store pane: Poly Haven + ambientCG (left of the project browser, same dock) ── */
  #dock{position:relative}
  #assetstore{display:flex;flex-direction:column;flex:0 0 var(--store-w);width:var(--store-w);min-width:0;border-right:1px solid var(--line);overflow:hidden;background:var(--panel)}
  .resizer-store{top:0;bottom:0;left:calc(var(--store-w) - 3px);width:6px;cursor:col-resize}
  #assetstore.collapsed{flex-basis:30px;width:30px}
  #assetstore.collapsed .store-bar,#assetstore.collapsed .store-body{display:none}
  #dock:has(#assetstore.collapsed) .resizer-store{display:none}
  .store-rail{display:none;flex:1;flex-direction:column;align-items:center;gap:8px;padding-top:8px;background:transparent;border:none;cursor:pointer;color:var(--dim)}
  .store-rail:hover{color:#fff;background:var(--panel2)}
  #assetstore.collapsed .store-rail{display:flex}
  .store-rail .icon{width:14px;height:14px}
  .store-bar{display:flex;align-items:center;gap:7px;padding:6px 8px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .store-bar.store-tabs{padding:4px 8px}
  .store-collapse{flex:0 0 auto}
  .store-title{color:#eef1f4;font-weight:600;font-size:11px;letter-spacing:.02em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .store-links{display:inline-flex;align-items:center;gap:5px;flex:0 0 auto}
  .store-links a{display:inline-flex;opacity:.75}
  .store-links a:hover{opacity:1}
  .store-logo{width:15px;height:15px;object-fit:contain;border-radius:3px;display:block}
  .store-res{flex:0 0 auto;padding:2px 5px;font-size:11px}
  .store-search{margin-left:0;flex:1;width:auto;min-width:0}
  .store-body{flex:1;min-height:0}
  .store-grid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr))}
  .store-card .asset-thumb{position:relative}
  /* per-card source badge (bottom-left of the thumbnail) */
  .store-card .store-src{position:absolute;left:3px;bottom:3px;width:15px;height:15px;object-fit:contain;border-radius:3px;background:rgba(10,12,14,.78);padding:1.5px;pointer-events:none}
  .store-card .btn.store-import{position:absolute;top:4px;right:4px;opacity:0;background:rgba(10,12,14,.8);border:1px solid var(--line2);color:#fff;border-radius:4px;padding:3px;transition:opacity .12s}
  .store-card:hover .btn.store-import,.store-card.busy .btn.store-import{opacity:1}
  .store-card .btn.store-import:hover{background:var(--accent);border-color:var(--accent)}
  .store-spin{width:12px;height:12px;border:2px solid var(--dim);border-top-color:var(--accent2);border-radius:50%;animation:storespin .8s linear infinite;display:block}
  @keyframes storespin{to{transform:rotate(360deg)}}
  .store-more{grid-column:1/-1;margin:4px 0}
  .store-err{font-family:var(--mono);font-size:10px;margin:4px 0;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .toast{position:fixed;bottom:238px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel3);border:1px solid var(--line2);border-left:3px solid var(--green);padding:8px 14px;border-radius:5px;opacity:0;transition:.25s;z-index:50;font-size:12px}
  .toast.err{border-left-color:var(--red)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar"></div>
  <div id="main">
    <div class="col" id="scene-col">
      <div class="col-head" id="left-head">Scene Outliner</div>
      <div id="scene-graph"></div>
    </div>
    <div id="viewport">
      <div class="vp-tabs" id="vp-tabs"></div>
      <div class="vp-stage" id="vp-stage">
        <canvas id="editor-canvas"></canvas>
        <canvas id="preview-canvas"></canvas>
        <div class="vp-modes" id="vp-modes"></div>
        <button class="vp-envbtn" id="vp-envbtn" title="Preview environment (skybox)">🌅 Environment</button>
        <div class="vp-perf" id="perf"></div>
        <div class="vp-hint" id="vp-hint">RMB+WASD/QE fly · W/E/R move·rotate·scale · centre handle = all axes · Shift/Ctrl-click multi-select · Ctrl+G group · Ctrl+C/V/X · Del · F frame · middle-click a tab to close</div>
      </div>
    </div>
    <div class="col" id="inspector"></div>
  </div>
  <div id="dock">
    <div id="assetstore"></div>
    <div id="browser"></div>
  </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
