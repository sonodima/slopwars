<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SlopWars — Map Editor</title>
<style>
  :root{
    --sand:#d8b878; --sand-dim:#a68b58; --ink:#0d0c0a; --panel:#14120e; --panel2:#1b1813;
    --line:rgba(216,184,120,.20); --red:#e0483a; --green:#8fbf4d; --text:#e8e0cf; --dim:#9c927e;
    --font:"Bahnschrift","DIN Alternate","Segoe UI",Arial,sans-serif;
    --mono:"Consolas","JetBrains Mono",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);color:var(--text);font-family:var(--font);font-size:13px}
  #app{display:grid;grid-template-rows:auto 1fr 230px;height:100%}
  .empty{color:var(--dim);padding:10px;font-style:italic}

  /* toolbar */
  #toolbar{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .brand{font-weight:700;color:var(--sand);letter-spacing:.04em;margin-right:8px}
  .bar-sep{width:1px;height:20px;background:var(--line);margin:0 4px}
  .bar-label{color:var(--dim);font-size:12px}
  .status{margin-left:auto;color:var(--dim);font-family:var(--mono);font-size:11px}
  .map-picker{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:5px;padding:4px 8px;font-family:var(--font)}

  .btn{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:5px;padding:4px 10px;cursor:pointer;font-family:var(--font);font-size:12px}
  .btn:hover{border-color:var(--sand-dim);background:#221e18}
  .btn.primary{background:var(--sand);color:#1a1610;border-color:var(--sand);font-weight:700}
  .btn.primary:hover{background:#e6c98a}
  .btn.mini{padding:1px 6px;font-size:11px;color:var(--dim);margin-left:auto}
  .btn.mini:hover{color:var(--red)}

  /* main split */
  #main{display:grid;grid-template-columns:250px 1fr 300px;overflow:hidden}
  .col{overflow:auto;background:var(--panel);border-right:1px solid var(--line)}
  #inspector{border-right:none;border-left:1px solid var(--line);padding:10px}
  #viewport{position:relative;background:#000;overflow:hidden}
  #editor-canvas{width:100%;height:100%;display:block;cursor:grab}
  #editor-canvas:active{cursor:grabbing}
  .col-head{padding:8px 10px;font-weight:700;color:var(--sand);border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);letter-spacing:.03em}

  /* scene graph */
  .sg-section{padding:7px 10px 3px;color:var(--sand-dim);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  .sg-row{display:flex;align-items:center;gap:8px;padding:4px 10px;cursor:pointer;border-left:2px solid transparent}
  .sg-row:hover{background:var(--panel2)}
  .sg-row.sel{background:#221e18;border-left-color:var(--sand)}
  .sg-label{color:var(--text)}
  .sg-sub{color:var(--dim);font-family:var(--mono);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* inspector */
  .insp-title{color:var(--sand);font-size:14px;margin-bottom:8px}
  .insp-group{color:var(--sand-dim);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin:12px 0 4px;border-bottom:1px solid var(--line);padding-bottom:2px}
  .field{display:flex;align-items:center;gap:8px;margin:4px 0}
  .field.check{cursor:pointer}
  .field-label{color:var(--dim);min-width:64px;font-size:12px}
  .field-input{flex:1;min-width:0;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:4px;padding:3px 6px;font-family:var(--mono);font-size:12px}
  .field-input:focus{outline:none;border-color:var(--sand-dim)}
  .field.vec3{align-items:flex-start;flex-direction:column;gap:3px}
  .vec3-inputs{display:flex;gap:4px;width:100%}
  .vec3-inputs .field-input{width:0}

  /* dock */
  #dock{display:grid;grid-template-rows:auto 1fr;background:var(--panel);border-top:1px solid var(--line);overflow:hidden}
  #dock-tabs{display:flex;gap:2px;padding:5px 8px 0;border-bottom:1px solid var(--line)}
  .tab{background:transparent;color:var(--dim);border:none;border-bottom:2px solid transparent;padding:5px 12px;cursor:pointer;font-family:var(--font);font-size:12px}
  .tab:hover{color:var(--text)}
  .tab.on{color:var(--sand);border-bottom-color:var(--sand)}
  #dock-body{overflow:auto;padding:8px 10px}
  .panel-hint{color:var(--dim);font-size:11px;margin-bottom:8px}
  .asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .asset-card{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:8px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;position:relative;text-align:center}
  .asset-card:hover{border-color:var(--sand-dim)}
  .asset-card.obj{cursor:copy}
  .asset-icon{font-size:22px;color:var(--sand-dim);height:34px;display:flex;align-items:center}
  .asset-thumb{width:100%;height:60px;object-fit:cover;border-radius:4px}
  .asset-name{font-size:11px;color:var(--text);word-break:break-word}
  .asset-audio{width:100%;height:26px}
  .asset-card .btn.mini{position:absolute;top:2px;right:2px;margin:0}
  .mat-form{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
  .mat-form .field-input{flex:0 1 130px}

  /* toast */
  .toast{position:fixed;bottom:250px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--green);padding:8px 14px;border-radius:6px;opacity:0;transition:.25s;z-index:50;font-size:12px}
  .toast.err{border-left-color:var(--red)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar"></div>
  <div id="main">
    <div class="col" id="scene-col">
      <div class="col-head">Scene Graph</div>
      <div id="scene-graph"></div>
    </div>
    <div id="viewport"><canvas id="editor-canvas"></canvas></div>
    <div class="col" id="inspector"></div>
  </div>
  <div id="dock">
    <div id="dock-tabs"></div>
    <div id="dock-body"></div>
  </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
