<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SlopWars — Map Editor</title>
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="theme-color" content="#0a0a0b">
<style>
  /* Unreal-style near-black editor palette */
  :root{
    --bg:#0a0a0b; --panel:#181a1d; --panel2:#202327; --panel3:#26292e;
    --line:#0c0d0e; --line2:#34383e; --text:#c8ccd2; --dim:#7d838c;
    --accent:#0a84ff; --accent2:#3a9bff; --amber:#f5a623; --green:#7bc043; --red:#e05a4d;
    --font:"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:"Consolas","JetBrains Mono",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:12px}
  :root{--left-w:236px;--right-w:288px;--dock-h:224px}
  #app{display:grid;grid-template-rows:auto 1fr var(--dock-h);height:100%;position:relative}
  .empty{color:var(--dim);padding:10px;font-style:italic;font-size:12px}

  /* resizable gutters */
  .resizer{position:absolute;z-index:20;background:transparent}
  .resizer:hover,.resizer:active{background:var(--accent)}
  .resizer-left{top:0;bottom:0;left:calc(var(--left-w) - 3px);width:6px;cursor:col-resize}
  .resizer-right{top:0;bottom:0;right:calc(var(--right-w) - 3px);width:6px;cursor:col-resize}
  .resizer-dock{left:0;right:0;bottom:calc(var(--dock-h) - 3px);height:6px;cursor:row-resize}

  /* toolbar */
  #toolbar{display:flex;align-items:center;gap:5px;padding:6px 9px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .brand-icon{height:24px;width:24px;object-fit:contain;border-radius:5px;display:block;flex:0 0 auto}
  .brand{font-weight:700;color:#fff;letter-spacing:.02em;margin-right:6px;font-size:13px}
  .bar-sep{width:1px;height:20px;background:var(--line2);margin:0 4px}
  .bar-label{color:var(--dim)}
  .map-name{margin-left:auto;color:#eef1f4;font-weight:600;font-size:12px;letter-spacing:.02em}
  .map-picker{background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:4px;padding:4px 7px;font-family:var(--font)}
  .tool-group{display:flex;gap:0;border:1px solid var(--line2);border-radius:5px;overflow:hidden}
  .tool-group .btn{border:none;border-right:1px solid var(--line);border-radius:0}
  .tool-group .btn:last-child{border-right:none}

  .btn{background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:4px;padding:4px 10px;cursor:pointer;font-family:var(--font);font-size:12px}
  .btn:hover{background:var(--panel3)}
  .btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .btn.primary:hover{background:var(--accent2)}
  .btn.mini{padding:0 5px;font-size:12px;color:var(--dim);border-color:transparent;background:transparent}
  .btn.mini:hover{color:#fff;background:var(--panel3)}

  /* main split */
  #main{display:grid;grid-template-columns:var(--left-w) 1fr var(--right-w);overflow:hidden;min-height:0;position:relative}
  .col{overflow:auto;background:var(--panel);border-right:1px solid var(--line)}
  #inspector{border-right:none;border-left:1px solid var(--line);padding:0 10px 14px}
  #viewport{position:relative;background:#050506;overflow:hidden}
  #editor-canvas{width:100%;height:100%;display:block;cursor:crosshair}
  .viewport-overlay{position:absolute;inset:0;pointer-events:none}
  .vp-perf{position:absolute;left:10px;top:8px;color:#9fe6a0;font-size:11px;font-family:var(--mono);pointer-events:none;text-shadow:0 1px 2px #000;background:rgba(0,0,0,.35);padding:3px 7px;border-radius:4px}
  .vp-hint{position:absolute;left:10px;bottom:8px;color:var(--dim);font-size:11px;font-family:var(--mono);pointer-events:none;text-shadow:0 1px 2px #000}
  .col-head{padding:7px 10px;font-weight:600;color:#eef1f4;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);letter-spacing:.02em;text-transform:uppercase;font-size:11px}

  /* scene outliner */
  .sg-search-bar{padding:6px 8px;position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);z-index:1}
  .sg-search{flex:1;min-width:0;background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:4px;padding:4px 8px;font-family:var(--font);font-size:12px}
  .sg-search:focus{outline:none;border-color:var(--accent)}
  .sg-list{padding:4px 0}
  .sg-row{display:flex;align-items:center;gap:6px;padding:3px 8px 3px 12px;cursor:pointer;border-left:2px solid transparent}
  .sg-row:hover{background:var(--panel2)}
  .sg-row.sel{background:#123;border-left-color:var(--accent)}
  .sg-row.sel.primary{background:#1a3350}
  .sg-row.drop{background:#12233a;border-left-color:var(--accent2);outline:1px dashed var(--accent2);outline-offset:-2px}
  .sg-label{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:capitalize}
  .sg-row .btn.mini{opacity:0}
  .sg-row:hover .btn.mini{opacity:1}
  .sg-world{border-bottom:1px solid var(--line2)}
  .sg-ico{margin-right:4px}
  .sg-group .sg-label{font-weight:600;color:#e6c98a;text-transform:none}
  .sg-caret{width:12px;display:inline-block;text-align:center;color:var(--dim);cursor:pointer;flex:0 0 auto}
  .sg-search-bar{display:flex;gap:6px;align-items:center}
  .sg-groupbtn{flex:0 0 auto;color:var(--accent2);border-color:var(--line2);background:var(--panel2)}
  .sg-groupbtn:hover{color:#fff;background:var(--accent)}
  .rename-input{flex:1;min-width:0;background:var(--panel3);color:#fff;border:1px solid var(--accent);border-radius:3px;padding:2px 6px;font-family:var(--font);font-size:12px}
  .rename-input:focus{outline:none}
  .insp-title .rename-input,h3.rename-input{font-size:14px}

  /* inspector */
  .insp-title{color:#fff;font-size:14px;padding-top:12px;text-transform:capitalize}
  .insp-sub{color:var(--dim);font-size:11px;margin-bottom:4px;font-family:var(--mono)}
  .insp-group{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 5px;border-bottom:1px solid var(--line2);padding-bottom:3px}
  .field{display:flex;align-items:center;gap:8px;margin:4px 0}
  .field.check{cursor:pointer}
  .field-label{color:var(--dim);min-width:66px;font-size:12px;text-transform:capitalize}
  .field-input{flex:1;min-width:0;background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:3px;padding:3px 6px;font-family:var(--mono);font-size:12px}
  .field-input:focus{outline:none;border-color:var(--accent)}
  .field-color{flex:1;min-width:0;height:26px;padding:0;background:var(--panel2);border:1px solid var(--line2);border-radius:3px;cursor:pointer}
  .field.vec3{align-items:flex-start;flex-direction:column;gap:3px}
  .vec3-inputs{display:flex;gap:4px;width:100%}
  .vec3-inputs .field-input{width:0}

  /* dock: unified asset browser */
  #dock{display:flex;background:var(--panel);border-top:1px solid var(--line);overflow:hidden;min-height:0}
  #browser{display:flex;flex-direction:column;overflow:hidden;min-height:0;flex:1}
  .browser-bar{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--line)}
  .browser-title{font-weight:600;color:#eef1f4;letter-spacing:.02em;text-transform:uppercase;font-size:11px}
  .browser-search{margin-left:auto;background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:4px;padding:4px 8px;font-family:var(--font);width:220px}
  .browser-search:focus{outline:none;border-color:var(--accent)}
  .browser-body{overflow:auto;padding:8px}
  .asset-section{margin-bottom:10px}
  .section-head{display:flex;align-items:center;gap:8px;margin:2px 2px 6px;position:sticky;top:-8px;background:var(--panel);padding:4px 0;z-index:1}
  .section-title{font-weight:600;color:#cfd3d9;letter-spacing:.04em;text-transform:uppercase;font-size:10px}
  .imp-btn{margin-left:auto;color:var(--accent2);border-color:var(--line2)!important;background:var(--panel2)!important}
  .imp-btn:hover{color:#fff;background:var(--accent)!important}
  .asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:7px}
  /* import dialog */
  .imp-body{padding:12px 14px;display:flex;flex-direction:column;gap:9px;min-width:380px;max-width:520px}
  .imp-hint{color:var(--dim);font-size:11px;line-height:1.5}
  .imp-row{display:flex;align-items:center;gap:10px}
  .imp-label{color:var(--dim);min-width:150px;font-size:12px}
  .imp-file,.imp-text{flex:1;min-width:0;background:var(--panel2);color:var(--text);border:1px solid var(--line2);border-radius:4px;padding:5px 7px;font-size:12px;font-family:var(--font)}
  .imp-text:focus,.imp-file:focus{outline:none;border-color:var(--accent)}
  .imp-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}
  .asset-card{background:var(--panel2);border:1px solid var(--line2);border-radius:5px;padding:7px;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;text-align:center}
  .asset-card.grab{cursor:grab}
  .asset-card.grab:hover{border-color:var(--accent)}
  .asset-thumb{width:100%;height:64px;border-radius:3px;display:flex;align-items:center;justify-content:center;background:#0e0f10;overflow:hidden}
  .asset-icon{font-size:22px;color:var(--dim);display:flex;align-items:center}
  .thumb-img{width:100%;height:100%;object-fit:contain;display:block}
  .asset-name{font-size:11px;color:var(--text);word-break:break-word}
  .asset-audioctl{display:flex;gap:4px;width:100%}
  .asset-audioctl .btn{flex:1;padding:2px 0;font-size:11px}
  .asset-card .btn.mini{position:absolute;top:1px;right:1px}

  /* modal (Load map) */
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100}
  .modal-card{background:var(--panel);border:1px solid var(--line2);border-radius:8px;min-width:340px;max-width:80vw;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--line2)}
  .modal-title{font-weight:600;color:#fff;font-size:13px}
  .map-list{overflow:auto;padding:6px}
  .map-row{display:flex;align-items:baseline;gap:10px;width:100%;text-align:left;background:transparent;border:none;border-radius:5px;padding:8px 10px;cursor:pointer;color:var(--text)}
  .map-row:hover{background:var(--panel2)}
  .map-row-name{font-weight:600;color:#eef1f4}
  .map-row-id{color:var(--dim);font-family:var(--mono);font-size:11px}

  /* drag-drop asset field + inline preview in the inspector */
  .assetfield{flex:1;min-width:0;display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line2);border-radius:4px;padding:3px 6px;cursor:default}
  .assetfield.drop{border-color:var(--accent);background:#12233a}
  .assetfield .af-prev{width:26px;height:26px;border-radius:3px;background:#0e0f10;flex:0 0 auto;object-fit:contain;display:block}
  .assetfield .af-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:12px;color:var(--text)}
  .assetfield .af-name.empty{color:var(--dim);font-style:italic}
  .assetfield .btn.mini{flex:0 0 auto}
  .af-prevwrap{width:26px;height:26px;border-radius:3px;background:#0e0f10;flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .af-ico{font-size:14px;color:var(--dim)}

  /* thumbnail picker modal */
  .picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:7px;padding:10px;overflow:auto;max-height:60vh;min-width:420px}
  .picker-card{background:var(--panel2);border:1px solid var(--line2);border-radius:5px;padding:6px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--text)}
  .picker-card:hover{border-color:var(--accent)}
  .picker-card .asset-thumb{width:100%;height:70px}
  .picker-card .asset-name{font-size:11px;word-break:break-word}

  .toast{position:fixed;bottom:238px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel3);border:1px solid var(--line2);border-left:3px solid var(--green);padding:8px 14px;border-radius:5px;opacity:0;transition:.25s;z-index:50;font-size:12px}
  .toast.err{border-left-color:var(--red)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar"></div>
  <div id="main">
    <div class="col" id="scene-col">
      <div class="col-head">Scene Outliner</div>
      <div id="scene-graph"></div>
    </div>
    <div id="viewport">
      <canvas id="editor-canvas"></canvas>
      <div class="vp-perf" id="perf"></div>
      <div class="vp-hint">RMB+WASD/QE fly · W/E/R move·rotate·scale · centre handle = all axes · Shift/Ctrl-click multi-select · Ctrl+G group · Ctrl+C/V/X · Del · F frame</div>
    </div>
    <div class="col" id="inspector"></div>
  </div>
  <div id="dock">
    <div id="browser"></div>
  </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
